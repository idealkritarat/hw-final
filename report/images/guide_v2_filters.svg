<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="980" viewBox="0 0 1800 980">
  <style>
    .bg{fill:#f8fafc}.panel{fill:#fff;stroke:#cbd5e1;stroke-width:3}.title{font:700 42px Arial,sans-serif;fill:#111827}.sub{font:24px Arial,sans-serif;fill:#475569}.head{font:700 30px Arial,sans-serif;fill:#111827}.body{font:23px Arial,sans-serif;fill:#334155}.small{font:20px Arial,sans-serif;fill:#475569}.card{fill:#fff;stroke:#cbd5e1;stroke-width:3}.raw{fill:#60a5fa}.gray1{fill:#d1d5db}.gray2{fill:#6b7280}.red{fill:#ef4444}.black{fill:#111827}.cyan{fill:#06b6d4}
  </style>
  <rect class="bg" width="1800" height="980"/>
  <text class="title" x="60" y="75">Filter Engine: What SW[1:0] Selects</text>
  <text class="sub" x="60" y="115">filter_engine.v is combinational: one input RGB565 pixel becomes one output RGB565 pixel.</text>
  <rect class="panel" x="45" y="145" width="1710" height="765" rx="24"/>

  <rect class="card" x="100" y="225" width="360" height="500" rx="22"/>
  <text class="head" x="280" y="275" text-anchor="middle">SW = 00</text>
  <text class="head" x="280" y="315" text-anchor="middle">Raw</text>
  <rect class="raw" x="165" y="365" width="230" height="160" rx="14"/>
  <circle cx="230" cy="430" r="35" fill="#ef4444"/>
  <circle cx="285" cy="465" r="35" fill="#22c55e"/>
  <circle cx="335" cy="430" r="35" fill="#3b82f6"/>
  <text class="body" x="280" y="600" text-anchor="middle">pixel_out = pixel_in</text>
  <text class="small" x="280" y="645" text-anchor="middle">no color change</text>

  <rect class="card" x="520" y="225" width="360" height="500" rx="22"/>
  <text class="head" x="700" y="275" text-anchor="middle">SW = 01</text>
  <text class="head" x="700" y="315" text-anchor="middle">Grayscale</text>
  <rect class="gray1" x="585" y="365" width="230" height="160" rx="14"/>
  <circle cx="650" cy="430" r="35" fill="#9ca3af"/>
  <circle cx="705" cy="465" r="35" fill="#6b7280"/>
  <circle cx="755" cy="430" r="35" fill="#d1d5db"/>
  <text class="body" x="700" y="590" text-anchor="middle">Y = R*54 + G*183 + B*18</text>
  <text class="small" x="700" y="630" text-anchor="middle">brightness copied into R/G/B</text>

  <rect class="card" x="940" y="225" width="360" height="500" rx="22"/>
  <text class="head" x="1120" y="275" text-anchor="middle">SW = 10</text>
  <text class="head" x="1120" y="315" text-anchor="middle">Red only</text>
  <rect class="black" x="1005" y="365" width="230" height="160" rx="14"/>
  <circle cx="1120" cy="445" r="58" fill="#ef4444"/>
  <text class="body" x="1120" y="600" text-anchor="middle">keep R bits</text>
  <text class="small" x="1120" y="645" text-anchor="middle">G = 0, B = 0</text>

  <rect class="card" x="1360" y="225" width="360" height="500" rx="22"/>
  <text class="head" x="1540" y="275" text-anchor="middle">SW = 11</text>
  <text class="head" x="1540" y="315" text-anchor="middle">Invert</text>
  <rect class="cyan" x="1425" y="365" width="230" height="160" rx="14"/>
  <circle cx="1490" cy="430" r="35" fill="#10b981"/>
  <circle cx="1545" cy="465" r="35" fill="#f59e0b"/>
  <circle cx="1595" cy="430" r="35" fill="#f43f5e"/>
  <text class="body" x="1540" y="600" text-anchor="middle">pixel_out = ~pixel_in</text>
  <text class="small" x="1540" y="645" text-anchor="middle">16-bit bitwise NOT</text>

  <rect class="card" x="260" y="790" width="1280" height="80" rx="18"/>
  <text class="body" x="900" y="840" text-anchor="middle">The filter has no frame memory. It changes each pixel independently as it is read from BRAM.</text>
</svg>
