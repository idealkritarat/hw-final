<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="980" viewBox="0 0 1800 980">
  <defs>
    <marker id="arrow" markerWidth="16" markerHeight="12" refX="15" refY="6" orient="auto"><path d="M0,0 L16,6 L0,12 Z" fill="#2563eb"/></marker>
    <style>
      .bg{fill:#f8fafc}.panel{fill:#fff;stroke:#cbd5e1;stroke-width:3}.title{font:700 42px Arial,sans-serif;fill:#111827}.sub{font:24px Arial,sans-serif;fill:#475569}.head{font:700 30px Arial,sans-serif;fill:#111827}.body{font:23px Arial,sans-serif;fill:#334155}.small{font:20px Arial,sans-serif;fill:#475569}.byte{fill:#dbeafe;stroke:#2563eb;stroke-width:3}.pix{fill:#ede9fe;stroke:#7c3aed;stroke-width:4}.warn{fill:#fee2e2;stroke:#ef4444;stroke-width:3}.ok{fill:#dcfce7;stroke:#16a34a;stroke-width:3}.line{fill:none;stroke:#2563eb;stroke-width:6;marker-end:url(#arrow)}.wave{fill:none;stroke:#111827;stroke-width:4}
    </style>
  </defs>
  <rect class="bg" width="1800" height="980"/>
  <text class="title" x="60" y="75">Camera Capture: Bytes Become Frame-Buffer Writes</text>
  <text class="sub" x="60" y="115">ov7670_capture.v runs on cam_pclk and writes one RGB565 pixel after two camera bytes.</text>
  <rect class="panel" x="45" y="145" width="1710" height="765" rx="24"/>

  <text class="head" x="95" y="205">1. Timing signals</text>
  <text class="body" x="140" y="270">cam_href</text>
  <polyline class="wave" points="285,270 360,270 360,230 950,230 950,270 1040,270"/>
  <text class="body" x="140" y="365">cam_pclk</text>
  <polyline class="wave" points="285,365 325,365 350,325 375,365 425,365 450,325 475,365 525,365 550,325 575,365 625,365 650,325 675,365 725,365 750,325 775,365 825,365 850,325 875,365 925,365 950,325 975,365"/>
  <text class="small" x="610" y="415" text-anchor="middle">Capture samples bytes while HREF is high.</text>

  <text class="head" x="1100" y="205">2. Byte pairing</text>
  <rect class="byte" x="1125" y="250" width="150" height="80" rx="12"/>
  <text class="body" x="1200" y="282" text-anchor="middle">first byte</text>
  <text class="small" x="1200" y="312" text-anchor="middle">saved</text>
  <rect class="byte" x="1340" y="250" width="150" height="80" rx="12"/>
  <text class="body" x="1415" y="282" text-anchor="middle">second byte</text>
  <text class="small" x="1415" y="312" text-anchor="middle">arrives</text>
  <rect class="pix" x="1260" y="395" width="210" height="90" rx="14"/>
  <text class="body" x="1365" y="430" text-anchor="middle">wr_data</text>
  <text class="body" x="1365" y="460" text-anchor="middle">{first_byte, cam_d}</text>
  <path class="line" d="M1200 330 L1325 388"/>
  <path class="line" d="M1415 330 L1395 388"/>

  <text class="head" x="95" y="540">3. Edge guard and downsample</text>
  <rect class="ok" x="160" y="590" width="640" height="220" rx="12"/>
  <rect class="warn" x="160" y="590" width="640" height="38" rx="0"/>
  <rect class="warn" x="160" y="590" width="42" height="220" rx="0"/>
  <text class="body" x="480" y="705" text-anchor="middle">valid image region</text>
  <text class="body" x="480" y="740" text-anchor="middle">only even h_cnt and even v_cnt are stored</text>
  <text class="small" x="480" y="785" text-anchor="middle">640 x 480 stream -> 320 x 240 frame</text>
  <text class="small" x="500" y="620" text-anchor="middle">first rows skipped</text>
  <text class="small" x="184" y="710" text-anchor="middle" transform="rotate(-90 184 710)">first pixels skipped</text>

  <rect class="pix" x="1010" y="610" width="520" height="180" rx="18"/>
  <text class="head" x="1270" y="658" text-anchor="middle">Write address</text>
  <text class="body" x="1270" y="705" text-anchor="middle">addr = row * 320 + col</text>
  <text class="body" x="1270" y="744" text-anchor="middle">row * 320 = (row &lt;&lt; 8) + (row &lt;&lt; 6)</text>
  <path class="line" d="M800 700 L990 700"/>
</svg>
