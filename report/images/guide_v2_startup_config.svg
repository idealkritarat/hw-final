<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="980" viewBox="0 0 1800 980">
  <defs>
    <marker id="arrow" markerWidth="16" markerHeight="12" refX="15" refY="6" orient="auto"><path d="M0,0 L16,6 L0,12 Z" fill="#d97706"/></marker>
    <style>
      .bg{fill:#f8fafc}.panel{fill:#fff;stroke:#cbd5e1;stroke-width:3}.title{font:700 42px Arial,sans-serif;fill:#111827}.sub{font:24px Arial,sans-serif;fill:#475569}.head{font:700 30px Arial,sans-serif;fill:#111827}.body{font:23px Arial,sans-serif;fill:#334155}.small{font:20px Arial,sans-serif;fill:#475569}.ctrl{fill:#fef3c7;stroke:#d97706;stroke-width:4}.note{fill:#f1f5f9;stroke:#94a3b8;stroke-width:3}.line{fill:none;stroke:#d97706;stroke-width:6;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="1800" height="980"/>
  <text class="title" x="60" y="75">Startup and Camera Configuration</text>
  <text class="sub" x="60" y="115">The camera is configured before live video is useful.</text>
  <rect class="panel" x="45" y="145" width="1710" height="765" rx="24"/>

  <rect class="ctrl" x="105" y="250" width="290" height="150" rx="18"/>
  <text class="head" x="250" y="300" text-anchor="middle">Power-on reset</text>
  <text class="body" x="250" y="340" text-anchor="middle">wait for PLL lock</text>
  <text class="body" x="250" y="372" text-anchor="middle">24-bit reset counter</text>

  <rect class="ctrl" x="505" y="250" width="290" height="150" rx="18"/>
  <text class="head" x="650" y="300" text-anchor="middle">Config FSM</text>
  <text class="body" x="650" y="340" text-anchor="middle">69 register entries</text>
  <text class="body" x="650" y="372" text-anchor="middle">2 ms between writes</text>

  <rect class="ctrl" x="905" y="250" width="290" height="150" rx="18"/>
  <text class="head" x="1050" y="300" text-anchor="middle">SCCB master</text>
  <text class="body" x="1050" y="340" text-anchor="middle">START, ID, reg</text>
  <text class="body" x="1050" y="372" text-anchor="middle">data, STOP</text>

  <rect class="ctrl" x="1305" y="250" width="290" height="150" rx="18"/>
  <text class="head" x="1450" y="300" text-anchor="middle">OV7670 ready</text>
  <text class="body" x="1450" y="340" text-anchor="middle">RGB565 output</text>
  <text class="body" x="1450" y="372" text-anchor="middle">stable video stream</text>

  <path class="line" d="M395 325 L490 325"/>
  <path class="line" d="M795 325 L890 325"/>
  <path class="line" d="M1195 325 L1290 325"/>

  <rect class="note" x="145" y="560" width="440" height="190" rx="18"/>
  <text class="head" x="365" y="610" text-anchor="middle">Why SCCB?</text>
  <text class="body" x="365" y="655" text-anchor="middle">OV7670 uses SCCB</text>
  <text class="body" x="365" y="688" text-anchor="middle">It is I2C-like</text>
  <text class="body" x="365" y="721" text-anchor="middle">FPGA acts as master</text>

  <rect class="note" x="680" y="560" width="440" height="190" rx="18"/>
  <text class="head" x="900" y="610" text-anchor="middle">Important register groups</text>
  <text class="body" x="900" y="655" text-anchor="middle">reset, RGB565 format</text>
  <text class="body" x="900" y="688" text-anchor="middle">windowing, exposure</text>
  <text class="body" x="900" y="721" text-anchor="middle">gamma and color matrix</text>

  <rect class="note" x="1215" y="560" width="440" height="190" rx="18"/>
  <text class="head" x="1435" y="610" text-anchor="middle">Open-drain SDA style</text>
  <text class="body" x="1435" y="655" text-anchor="middle">drive low for 0</text>
  <text class="body" x="1435" y="688" text-anchor="middle">release for 1</text>
  <text class="body" x="1435" y="721" text-anchor="middle">cam_sda = sda_out ? Z : 0</text>
</svg>
