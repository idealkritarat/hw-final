<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="980" viewBox="0 0 1800 980">
  <defs>
    <marker id="arrow" markerWidth="16" markerHeight="12" refX="15" refY="6" orient="auto"><path d="M0,0 L16,6 L0,12 Z" fill="#2563eb"/></marker>
    <style>
      .bg{fill:#f8fafc}.panel{fill:#fff;stroke:#cbd5e1;stroke-width:3}.title{font:700 42px Arial,sans-serif;fill:#111827}.sub{font:24px Arial,sans-serif;fill:#475569}.head{font:700 30px Arial,sans-serif;fill:#111827}.body{font:23px Arial,sans-serif;fill:#334155}.small{font:20px Arial,sans-serif;fill:#475569}.cam{fill:#dcfce7;stroke:#16a34a;stroke-width:4}.mem{fill:#ede9fe;stroke:#7c3aed;stroke-width:4}.disp{fill:#ffedd5;stroke:#ea580c;stroke-width:4}.note{fill:#f1f5f9;stroke:#94a3b8;stroke-width:3}.line{fill:none;stroke:#2563eb;stroke-width:6;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="1800" height="980"/>
  <text class="title" x="60" y="75">Frame Buffer: Why the Design Uses BRAM</text>
  <text class="sub" x="60" y="115">The Basys 3 can store 320 x 240 RGB565 on chip, but not full 640 x 480 RGB565.</text>
  <rect class="panel" x="45" y="145" width="1710" height="765" rx="24"/>

  <rect class="cam" x="110" y="245" width="360" height="180" rx="22"/>
  <text class="head" x="290" y="295" text-anchor="middle">Camera write side</text>
  <text class="body" x="290" y="340" text-anchor="middle">clock: cam_pclk</text>
  <text class="body" x="290" y="374" text-anchor="middle">signals: wr_en, wr_addr</text>
  <text class="body" x="290" y="408" text-anchor="middle">data: wr_data RGB565</text>

  <rect class="mem" x="650" y="220" width="500" height="230" rx="24"/>
  <text class="head" x="900" y="275" text-anchor="middle">True dual-port BRAM</text>
  <text class="body" x="900" y="322" text-anchor="middle">width = 16 bits</text>
  <text class="body" x="900" y="356" text-anchor="middle">depth = 76,800 pixels</text>
  <text class="body" x="900" y="390" text-anchor="middle">one 320 x 240 frame</text>
  <text class="body" x="900" y="424" text-anchor="middle">native Xilinx BRAM interface</text>

  <rect class="disp" x="1330" y="245" width="360" height="180" rx="22"/>
  <text class="head" x="1510" y="295" text-anchor="middle">VGA read side</text>
  <text class="body" x="1510" y="340" text-anchor="middle">clock: pixel_clk</text>
  <text class="body" x="1510" y="374" text-anchor="middle">signal: rd_addr</text>
  <text class="body" x="1510" y="408" text-anchor="middle">data: rd_data RGB565</text>

  <path class="line" d="M470 335 L630 335"/>
  <path class="line" d="M1150 335 L1310 335"/>

  <rect class="note" x="150" y="560" width="430" height="220" rx="18"/>
  <text class="head" x="365" y="610" text-anchor="middle">Full VGA frame</text>
  <text class="body" x="365" y="660" text-anchor="middle">640 x 480 x 16</text>
  <text class="body" x="365" y="700" text-anchor="middle">= 4,915,200 bits</text>
  <text class="body" x="365" y="740" text-anchor="middle">too large for this board</text>

  <rect class="note" x="685" y="560" width="430" height="220" rx="18"/>
  <text class="head" x="900" y="610" text-anchor="middle">Stored project frame</text>
  <text class="body" x="900" y="660" text-anchor="middle">320 x 240 x 16</text>
  <text class="body" x="900" y="700" text-anchor="middle">= 1,228,800 bits</text>
  <text class="body" x="900" y="740" text-anchor="middle">fits in Basys 3 BRAM</text>

  <rect class="note" x="1220" y="560" width="430" height="220" rx="18"/>
  <text class="head" x="1435" y="610" text-anchor="middle">Addressing formula</text>
  <text class="body" x="1435" y="660" text-anchor="middle">addr = y * 320 + x</text>
  <text class="body" x="1435" y="700" text-anchor="middle">320 = 256 + 64</text>
  <text class="body" x="1435" y="740" text-anchor="middle">use shifts instead of multiply</text>
</svg>
