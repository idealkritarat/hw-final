<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1050" viewBox="0 0 1800 1050" role="img" aria-labelledby="title desc">
  <title id="title">Overall design block diagram for the OV7670 VGA video processing system</title>
  <desc id="desc">The Basys 3 FPGA captures RGB565 video from an OV7670 camera, stores it in dual-port BRAM, reads the frame for VGA output, applies filters, and drives a VGA monitor.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#243044"/>
    </marker>
    <marker id="arrow-soft" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="124%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#64748b" flood-opacity="0.20"/>
    </filter>
    <style>
      .page-title { font: 700 34px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 18px Arial, sans-serif; fill: #475569; }
      .domain-title { font: 700 21px Arial, sans-serif; fill: #111827; }
      .domain-subtitle { font: 15px Arial, sans-serif; fill: #475569; }
      .block-title { font: 700 20px Arial, sans-serif; fill: #111827; }
      .block-text { font: 15px Arial, sans-serif; fill: #334155; }
      .note-title { font: 700 17px Arial, sans-serif; fill: #111827; }
      .note-text { font: 14px Arial, sans-serif; fill: #334155; }
      .tag-text { font: 13px Arial, sans-serif; fill: #334155; }
      .domain { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2.5; rx: 20; }
      .lane { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1.5; rx: 16; }
      .camera { fill: #e0f2fe; stroke: #0284c7; stroke-width: 3; rx: 14; filter: url(#shadow); }
      .capture { fill: #dcfce7; stroke: #16a34a; stroke-width: 3; rx: 14; filter: url(#shadow); }
      .memory { fill: #ede9fe; stroke: #7c3aed; stroke-width: 3; rx: 14; filter: url(#shadow); }
      .display { fill: #fce7f3; stroke: #db2777; stroke-width: 3; rx: 14; filter: url(#shadow); }
      .config { fill: #fef3c7; stroke: #d97706; stroke-width: 3; rx: 14; filter: url(#shadow); }
      .clock { fill: #f1f5f9; stroke: #475569; stroke-width: 2.5; rx: 14; filter: url(#shadow); }
      .io { fill: #fff7ed; stroke: #ea580c; stroke-width: 3; rx: 14; filter: url(#shadow); }
      .note { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 12; }
      .tag { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 8; }
      .wire { stroke: #243044; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .wire-soft { stroke: #64748b; stroke-width: 2.5; fill: none; marker-end: url(#arrow-soft); }
      .wire-dash { stroke: #64748b; stroke-width: 2.4; stroke-dasharray: 8 7; fill: none; marker-end: url(#arrow-soft); }
    </style>
  </defs>

  <rect width="1800" height="1050" fill="#ffffff"/>

  <text x="70" y="58" class="page-title">Real-Time OV7670 Video Capture and VGA Processing System</text>
  <text x="70" y="90" class="subtitle">Basys 3 Artix-7 design with camera capture, dual-port frame buffering, image filtering, and 640x480 VGA output</text>

  <!-- External devices -->
  <rect x="60" y="285" width="230" height="140" class="camera"/>
  <text x="175" y="326" text-anchor="middle" class="block-title">OV7670 Camera</text>
  <text x="175" y="356" text-anchor="middle" class="block-text">Parallel RGB565 stream</text>
  <text x="175" y="383" text-anchor="middle" class="block-text">D[7:0], PCLK</text>
  <text x="175" y="407" text-anchor="middle" class="block-text">HREF, VSYNC</text>

  <rect x="1590" y="318" width="165" height="128" class="io"/>
  <text x="1672" y="358" text-anchor="middle" class="block-title">VGA Monitor</text>
  <text x="1672" y="389" text-anchor="middle" class="block-text">4-bit R/G/B DAC</text>
  <text x="1672" y="416" text-anchor="middle" class="block-text">HSYNC / VSYNC</text>

  <!-- FPGA boundary -->
  <rect x="330" y="135" width="1225" height="790" class="domain"/>
  <text x="360" y="172" class="domain-title">Basys 3 FPGA</text>
  <text x="360" y="198" class="domain-subtitle">Internal HDL modules and Xilinx IP cores</text>

  <rect x="360" y="225" width="1165" height="260" class="lane"/>
  <text x="385" y="257" class="note-title">Video data path</text>

  <rect x="360" y="600" width="1165" height="255" class="lane"/>
  <text x="385" y="632" class="note-title">Camera configuration, clocks, and control</text>

  <!-- Video path modules -->
  <rect x="385" y="292" width="240" height="140" class="capture"/>
  <text x="505" y="331" text-anchor="middle" class="block-title">ov7670_capture</text>
  <text x="505" y="363" text-anchor="middle" class="block-text">Pair bytes into RGB565</text>
  <text x="505" y="390" text-anchor="middle" class="block-text">Crop edge artifacts</text>
  <text x="505" y="417" text-anchor="middle" class="block-text">Write 320x240 frame</text>

  <rect x="700" y="292" width="240" height="140" class="memory"/>
  <text x="820" y="331" text-anchor="middle" class="block-title">frame_buffer</text>
  <text x="820" y="363" text-anchor="middle" class="block-text">True dual-port BRAM</text>
  <text x="820" y="390" text-anchor="middle" class="block-text">76,800 x 16-bit pixels</text>
  <text x="820" y="417" text-anchor="middle" class="block-text">RGB565 frame storage</text>

  <rect x="1015" y="257" width="250" height="130" class="display"/>
  <text x="1140" y="297" text-anchor="middle" class="block-title">display_scaler</text>
  <text x="1140" y="328" text-anchor="middle" class="block-text">Rotate, mirror, scale</text>
  <text x="1140" y="356" text-anchor="middle" class="block-text">Generate BRAM read addr</text>

  <rect x="1300" y="292" width="220" height="120" class="display"/>
  <text x="1410" y="331" text-anchor="middle" class="block-title">filter_engine</text>
  <text x="1410" y="362" text-anchor="middle" class="block-text">Raw, grayscale</text>
  <text x="1410" y="389" text-anchor="middle" class="block-text">Red-only, inversion</text>

  <rect x="1015" y="500" width="250" height="130" class="display"/>
  <text x="1140" y="540" text-anchor="middle" class="block-title">vga_controller</text>
  <text x="1140" y="571" text-anchor="middle" class="block-text">640x480 timing counters</text>
  <text x="1140" y="599" text-anchor="middle" class="block-text">HSYNC, VSYNC, active</text>

  <!-- Configuration and control modules -->
  <rect x="385" y="670" width="235" height="120" class="clock"/>
  <text x="503" y="708" text-anchor="middle" class="block-title">Clock Wizard</text>
  <text x="503" y="739" text-anchor="middle" class="block-text">100 MHz input</text>
  <text x="503" y="766" text-anchor="middle" class="block-text">25 MHz pixel, 24 MHz XCLK</text>

  <rect x="695" y="670" width="240" height="120" class="config"/>
  <text x="815" y="708" text-anchor="middle" class="block-title">ov7670_config</text>
  <text x="815" y="739" text-anchor="middle" class="block-text">69 register writes</text>
  <text x="815" y="766" text-anchor="middle" class="block-text">RGB565, exposure, gamma</text>

  <rect x="1015" y="670" width="250" height="120" class="config"/>
  <text x="1140" y="708" text-anchor="middle" class="block-title">sccb_master</text>
  <text x="1140" y="739" text-anchor="middle" class="block-text">100 kHz SCCB bus</text>
  <text x="1140" y="766" text-anchor="middle" class="block-text">START, ID, register, data</text>

  <rect x="1300" y="455" width="220" height="100" class="note"/>
  <text x="1410" y="490" text-anchor="middle" class="note-title">Switch Control</text>
  <text x="1410" y="518" text-anchor="middle" class="note-text">SW[1:0] selects</text>
  <text x="1410" y="540" text-anchor="middle" class="note-text">the active video filter</text>

  <rect x="1300" y="690" width="220" height="125" class="note"/>
  <text x="1410" y="728" text-anchor="middle" class="note-title">Reset and CDC</text>
  <text x="1410" y="758" text-anchor="middle" class="note-text">Reset synchronized</text>
  <text x="1410" y="782" text-anchor="middle" class="note-text">per clock domain</text>
  <text x="1410" y="806" text-anchor="middle" class="note-text">frame_done uses toggle CDC</text>

  <!-- Main data arrows -->
  <path class="wire" d="M 290 355 L 385 355"/>
  <rect x="300" y="300" width="78" height="45" class="tag"/>
  <text x="339" y="319" text-anchor="middle" class="tag-text">PCLK</text>
  <text x="339" y="337" text-anchor="middle" class="tag-text">8-bit data</text>

  <path class="wire" d="M 625 355 L 700 355"/>
  <rect x="638" y="303" width="50" height="45" class="tag"/>
  <text x="663" y="322" text-anchor="middle" class="tag-text">write</text>
  <text x="663" y="340" text-anchor="middle" class="tag-text">RGB565</text>

  <path class="wire" d="M 940 355 L 1015 322"/>
  <rect x="952" y="287" width="54" height="45" class="tag"/>
  <text x="979" y="306" text-anchor="middle" class="tag-text">read</text>
  <text x="979" y="324" text-anchor="middle" class="tag-text">BRAM</text>

  <path class="wire" d="M 1265 322 L 1300 352"/>

  <path class="wire" d="M 1520 352 L 1590 375"/>
  <rect x="1528" y="318" width="54" height="45" class="tag"/>
  <text x="1555" y="337" text-anchor="middle" class="tag-text">RGB</text>
  <text x="1555" y="355" text-anchor="middle" class="tag-text">pixels</text>

  <!-- VGA timing arrows -->
  <path class="wire-soft" d="M 1140 500 L 1140 387"/>
  <rect x="1160" y="430" width="88" height="44" class="tag"/>
  <text x="1204" y="449" text-anchor="middle" class="tag-text">hcount/vcount</text>
  <text x="1204" y="467" text-anchor="middle" class="tag-text">active</text>

  <path class="wire-soft" d="M 1265 595 C 1420 675 1555 555 1590 430"/>
  <rect x="1455" y="585" width="90" height="44" class="tag"/>
  <text x="1500" y="604" text-anchor="middle" class="tag-text">HSYNC</text>
  <text x="1500" y="622" text-anchor="middle" class="tag-text">VSYNC</text>

  <path class="wire-soft" d="M 1410 455 L 1410 412"/>

  <!-- Clock and configuration arrows -->
  <path class="wire-soft" d="M 620 730 L 695 730"/>
  <rect x="636" y="694" width="48" height="28" class="tag"/>
  <text x="660" y="713" text-anchor="middle" class="tag-text">100 MHz</text>

  <path class="wire-soft" d="M 935 730 L 1015 730"/>
  <rect x="952" y="694" width="56" height="44" class="tag"/>
  <text x="980" y="713" text-anchor="middle" class="tag-text">reg</text>
  <text x="980" y="731" text-anchor="middle" class="tag-text">addr/data</text>

  <path class="wire-soft" d="M 385 718 C 270 690 180 550 175 425"/>
  <rect x="170" y="555" width="88" height="28" class="tag"/>
  <text x="214" y="574" text-anchor="middle" class="tag-text">24 MHz XCLK</text>

  <path class="wire-soft" d="M 1140 790 C 1140 895 170 895 170 425"/>
  <rect x="575" y="866" width="170" height="30" class="tag"/>
  <text x="660" y="886" text-anchor="middle" class="tag-text">SCCB register writes to camera</text>

  <!-- Clock-domain labels -->
  <rect x="385" y="235" width="170" height="30" class="tag"/>
  <text x="470" y="255" text-anchor="middle" class="tag-text">cam_pclk domain</text>

  <rect x="1015" y="235" width="186" height="30" class="tag"/>
  <text x="1108" y="255" text-anchor="middle" class="tag-text">25 MHz pixel domain</text>

  <rect x="695" y="635" width="170" height="30" class="tag"/>
  <text x="780" y="655" text-anchor="middle" class="tag-text">100 MHz config domain</text>
</svg>
