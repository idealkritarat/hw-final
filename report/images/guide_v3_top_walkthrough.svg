<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="980" viewBox="0 0 1800 980">
  <defs>
    <marker id="arrowB" markerWidth="16" markerHeight="12" refX="15" refY="6" orient="auto"><path d="M0,0 L16,6 L0,12 Z" fill="#2563eb"/></marker>
    <marker id="arrowO" markerWidth="16" markerHeight="12" refX="15" refY="6" orient="auto"><path d="M0,0 L16,6 L0,12 Z" fill="#d97706"/></marker>
    <style>
      .bg{fill:#f8fafc}.panel{fill:#fff;stroke:#cbd5e1;stroke-width:3}.title{font:700 42px Arial,sans-serif;fill:#111827}.sub{font:24px Arial,sans-serif;fill:#475569}.head{font:700 26px Arial,sans-serif;fill:#111827}.body{font:20px Arial,sans-serif;fill:#334155}.small{font:18px Arial,sans-serif;fill:#475569}.clock{fill:#fee2e2;stroke:#dc2626;stroke-width:4}.ctrl{fill:#fef3c7;stroke:#d97706;stroke-width:4}.cam{fill:#dcfce7;stroke:#16a34a;stroke-width:4}.mem{fill:#ede9fe;stroke:#7c3aed;stroke-width:4}.disp{fill:#ffedd5;stroke:#ea580c;stroke-width:4}.note{fill:#e0f2fe;stroke:#0284c7;stroke-width:4}.line{fill:none;stroke:#2563eb;stroke-width:5;marker-end:url(#arrowB)}.cline{fill:none;stroke:#d97706;stroke-width:5;marker-end:url(#arrowO)}
    </style>
  </defs>
  <rect class="bg" width="1800" height="980"/>
  <text class="title" x="60" y="75">top.v Walkthrough</text>
  <text class="sub" x="60" y="115">top.v does not process pixels itself. It connects blocks and protects clock-domain crossings.</text>
  <rect class="panel" x="45" y="145" width="1710" height="765" rx="24"/>

  <rect class="clock" x="100" y="210" width="330" height="140" rx="18"/>
  <text class="head" x="265" y="250" text-anchor="middle">Clock generation</text>
  <text class="body" x="265" y="288" text-anchor="middle">clk_wiz_0</text>
  <text class="body" x="265" y="318" text-anchor="middle">ODDR for cam_xclk</text>

  <rect class="clock" x="100" y="430" width="330" height="140" rx="18"/>
  <text class="head" x="265" y="470" text-anchor="middle">Reset generation</text>
  <text class="body" x="265" y="508" text-anchor="middle">wait for PLL lock</text>
  <text class="body" x="265" y="538" text-anchor="middle">sync reset to domains</text>

  <rect class="ctrl" x="545" y="210" width="330" height="140" rx="18"/>
  <text class="head" x="710" y="250" text-anchor="middle">Camera config</text>
  <text class="body" x="710" y="288" text-anchor="middle">ov7670_config</text>
  <text class="body" x="710" y="318" text-anchor="middle">sccb_master</text>

  <rect class="cam" x="545" y="430" width="330" height="140" rx="18"/>
  <text class="head" x="710" y="470" text-anchor="middle">Camera capture</text>
  <text class="body" x="710" y="508" text-anchor="middle">ov7670_capture</text>
  <text class="body" x="710" y="538" text-anchor="middle">wr_en / wr_addr / wr_data</text>

  <rect class="mem" x="990" y="430" width="330" height="140" rx="18"/>
  <text class="head" x="1155" y="470" text-anchor="middle">Frame buffer</text>
  <text class="body" x="1155" y="508" text-anchor="middle">Port A: camera write</text>
  <text class="body" x="1155" y="538" text-anchor="middle">Port B: VGA read</text>

  <rect class="disp" x="1435" y="210" width="280" height="140" rx="18"/>
  <text class="head" x="1575" y="250" text-anchor="middle">VGA timing</text>
  <text class="body" x="1575" y="288" text-anchor="middle">vga_controller</text>
  <text class="body" x="1575" y="318" text-anchor="middle">hcount/vcount</text>

  <rect class="disp" x="1435" y="430" width="280" height="140" rx="18"/>
  <text class="head" x="1575" y="470" text-anchor="middle">Display output</text>
  <text class="body" x="1575" y="508" text-anchor="middle">display_scaler</text>
  <text class="body" x="1575" y="538" text-anchor="middle">RGB + delayed sync</text>

  <rect class="note" x="545" y="680" width="775" height="120" rx="18"/>
  <text class="head" x="932" y="722" text-anchor="middle">Frame_done CDC</text>
  <text class="body" x="932" y="760" text-anchor="middle">camera pulse -> toggle -> 3 flip-flop sync -> pixel-domain pulse</text>
  <text class="body" x="932" y="790" text-anchor="middle">sets frame_valid so startup garbage stays off screen</text>

  <path class="cline" d="M430 280 L530 280"/>
  <path class="line" d="M875 500 L975 500"/>
  <path class="line" d="M1320 500 L1420 500"/>
  <path class="cline" d="M1575 350 L1575 415"/>
  <path class="cline" d="M710 570 C735 640 815 655 890 675"/>
  <path class="cline" d="M1155 570 C1135 640 1055 655 980 675"/>
</svg>
