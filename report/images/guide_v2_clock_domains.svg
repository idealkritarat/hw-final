<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="980" viewBox="0 0 1800 980">
  <defs>
    <marker id="blueArrow" markerWidth="16" markerHeight="12" refX="15" refY="6" orient="auto"><path d="M0,0 L16,6 L0,12 Z" fill="#2563eb"/></marker>
    <marker id="redArrow" markerWidth="16" markerHeight="12" refX="15" refY="6" orient="auto"><path d="M0,0 L16,6 L0,12 Z" fill="#dc2626"/></marker>
    <style>
      .bg{fill:#f8fafc}.panel{fill:#fff;stroke:#cbd5e1;stroke-width:3}.title{font:700 42px Arial,sans-serif;fill:#111827}.sub{font:24px Arial,sans-serif;fill:#475569}.head{font:700 30px Arial,sans-serif;fill:#111827}.body{font:23px Arial,sans-serif;fill:#334155}.small{font:20px Arial,sans-serif;fill:#475569}.sys{fill:#fef3c7;stroke:#d97706;stroke-width:4}.cam{fill:#dcfce7;stroke:#16a34a;stroke-width:4}.pix{fill:#ffedd5;stroke:#ea580c;stroke-width:4}.note{fill:#eef2ff;stroke:#6366f1;stroke-width:3}.line{fill:none;stroke:#2563eb;stroke-width:6;marker-end:url(#blueArrow)}.clock{fill:none;stroke:#dc2626;stroke-width:5;stroke-dasharray:14 10;marker-end:url(#redArrow)}
    </style>
  </defs>
  <rect class="bg" width="1800" height="980"/>
  <text class="title" x="60" y="75">Clock Domains and Safe Crossings</text>
  <text class="sub" x="60" y="115">This project is harder than a single-clock calculator because three timing worlds meet.</text>
  <rect class="panel" x="45" y="145" width="1710" height="765" rx="24"/>

  <rect class="sys" x="95" y="245" width="430" height="230" rx="22"/>
  <text class="head" x="310" y="295" text-anchor="middle">100 MHz system domain</text>
  <text class="body" x="310" y="340" text-anchor="middle">clk_100mhz</text>
  <text class="body" x="310" y="378" text-anchor="middle">ov7670_config</text>
  <text class="body" x="310" y="410" text-anchor="middle">sccb_master</text>
  <text class="body" x="310" y="442" text-anchor="middle">power-on reset counter</text>

  <rect class="cam" x="685" y="245" width="430" height="230" rx="22"/>
  <text class="head" x="900" y="295" text-anchor="middle">camera PCLK domain</text>
  <text class="body" x="900" y="340" text-anchor="middle">cam_pclk from camera</text>
  <text class="body" x="900" y="378" text-anchor="middle">ov7670_capture</text>
  <text class="body" x="900" y="410" text-anchor="middle">BRAM Port A write</text>
  <text class="body" x="900" y="442" text-anchor="middle">frame_done pulse starts here</text>

  <rect class="pix" x="1275" y="245" width="430" height="230" rx="22"/>
  <text class="head" x="1490" y="295" text-anchor="middle">25 MHz pixel domain</text>
  <text class="body" x="1490" y="340" text-anchor="middle">pixel_clk</text>
  <text class="body" x="1490" y="378" text-anchor="middle">vga_controller</text>
  <text class="body" x="1490" y="410" text-anchor="middle">display_scaler</text>
  <text class="body" x="1490" y="442" text-anchor="middle">BRAM Port B read</text>

  <path class="clock" d="M310 515 L310 585"/>
  <path class="clock" d="M900 515 L900 585"/>
  <path class="clock" d="M1490 515 L1490 585"/>
  <text class="small" x="310" y="622" text-anchor="middle">config timing</text>
  <text class="small" x="900" y="622" text-anchor="middle">camera capture timing</text>
  <text class="small" x="1490" y="622" text-anchor="middle">VGA display timing</text>

  <rect class="note" x="195" y="690" width="600" height="140" rx="18"/>
  <text class="head" x="495" y="735" text-anchor="middle">Pixel data crossing</text>
  <text class="body" x="495" y="775" text-anchor="middle">Handled by true dual-port BRAM</text>
  <text class="body" x="495" y="807" text-anchor="middle">write with cam_pclk, read with pixel_clk</text>

  <rect class="note" x="1005" y="690" width="600" height="140" rx="18"/>
  <text class="head" x="1305" y="735" text-anchor="middle">Frame_done crossing</text>
  <text class="body" x="1305" y="775" text-anchor="middle">pulse -> toggle -> 3 flip-flop sync -> pulse</text>
  <text class="body" x="1305" y="807" text-anchor="middle">prevents missing a one-cycle camera pulse</text>

  <path class="line" d="M900 475 C860 575 665 610 540 680"/>
  <path class="line" d="M900 475 C980 585 1165 610 1305 680"/>
</svg>
