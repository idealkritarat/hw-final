<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="980" viewBox="0 0 1700 980">
  <defs>
    <marker id="arrow" markerWidth="14" markerHeight="10" refX="13" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L14,5 L0,10 Z" fill="#2563eb"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 34px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 18px Arial, sans-serif; fill: #475569; }
      .step-title { font: 700 21px Arial, sans-serif; fill: #111827; }
      .body { font: 16px Arial, sans-serif; fill: #334155; }
      .small { font: 14px Arial, sans-serif; fill: #475569; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      .camera { fill: #dcfce7; stroke: #16a34a; stroke-width: 3; }
      .memory { fill: #ede9fe; stroke: #7c3aed; stroke-width: 3; }
      .display { fill: #ffedd5; stroke: #ea580c; stroke-width: 3; }
      .compute { fill: #dbeafe; stroke: #2563eb; stroke-width: 3; }
      .warn { fill: #fee2e2; stroke: #ef4444; stroke-width: 2; }
      .arrow { fill: none; stroke: #2563eb; stroke-width: 4; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1700" height="980"/>
  <text class="title" x="60" y="62">Pixel Journey: From OV7670 Bytes to VGA Color</text>
  <text class="subtitle" x="60" y="96">This chart shows the exact meaning of the main pixel-handling code.</text>

  <rect class="panel" x="40" y="130" width="1620" height="790" rx="18"/>

  <!-- Step 1 -->
  <rect class="camera" x="75" y="170" width="260" height="170" rx="16"/>
  <text class="step-title" x="205" y="205" text-anchor="middle">1. Camera sends bytes</text>
  <text class="body" x="205" y="240" text-anchor="middle">cam_d[7:0]</text>
  <text class="body" x="205" y="265" text-anchor="middle">sampled by cam_pclk</text>
  <text class="body" x="205" y="290" text-anchor="middle">HREF marks valid row</text>
  <text class="body" x="205" y="315" text-anchor="middle">VSYNC marks frame boundary</text>

  <!-- Step 2 -->
  <rect class="compute" x="410" y="170" width="290" height="170" rx="16"/>
  <text class="step-title" x="555" y="205" text-anchor="middle">2. Pair two bytes</text>
  <rect x="455" y="235" width="90" height="42" rx="7" fill="#bfdbfe" stroke="#2563eb"/>
  <rect x="565" y="235" width="90" height="42" rx="7" fill="#bfdbfe" stroke="#2563eb"/>
  <text class="body" x="500" y="262" text-anchor="middle">MSB</text>
  <text class="body" x="610" y="262" text-anchor="middle">LSB</text>
  <text class="body" x="555" y="307" text-anchor="middle">wr_data = {first_byte, cam_d}</text>

  <!-- Step 3 RGB565 -->
  <rect class="compute" x="775" y="170" width="300" height="170" rx="16"/>
  <text class="step-title" x="925" y="205" text-anchor="middle">3. RGB565 pixel</text>
  <rect x="830" y="238" width="70" height="46" fill="#ef4444"/>
  <rect x="900" y="238" width="85" height="46" fill="#16a34a"/>
  <rect x="985" y="238" width="70" height="46" fill="#2563eb"/>
  <text class="body" x="865" y="267" text-anchor="middle" fill="#ffffff">R5</text>
  <text class="body" x="942" y="267" text-anchor="middle" fill="#ffffff">G6</text>
  <text class="body" x="1020" y="267" text-anchor="middle" fill="#ffffff">B5</text>
  <text class="body" x="925" y="313" text-anchor="middle">16 bits per pixel</text>

  <!-- Step 4 -->
  <rect class="compute" x="1150" y="170" width="310" height="170" rx="16"/>
  <text class="step-title" x="1305" y="205" text-anchor="middle">4. Crop and downsample</text>
  <rect x="1208" y="232" width="190" height="82" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <rect x="1208" y="232" width="190" height="16" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <rect x="1208" y="232" width="16" height="82" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <text class="body" x="1305" y="274" text-anchor="middle">keep even x and y</text>
  <text class="body" x="1305" y="312" text-anchor="middle">640x480 to 320x240</text>

  <path class="arrow" d="M335 255 L400 255"/>
  <path class="arrow" d="M700 255 L765 255"/>
  <path class="arrow" d="M1075 255 L1140 255"/>

  <!-- Middle row -->
  <rect class="memory" x="205" y="430" width="360" height="150" rx="16"/>
  <text class="step-title" x="385" y="465" text-anchor="middle">5. Write frame buffer</text>
  <text class="body" x="385" y="500" text-anchor="middle">addr = y * 320 + x</text>
  <text class="body" x="385" y="528" text-anchor="middle">implemented as (y &lt;&lt; 8) + (y &lt;&lt; 6) + x</text>
  <text class="body" x="385" y="556" text-anchor="middle">BRAM depth = 76,800 pixels</text>

  <rect class="display" x="685" y="430" width="360" height="150" rx="16"/>
  <text class="step-title" x="865" y="465" text-anchor="middle">6. Read for VGA</text>
  <text class="body" x="865" y="500" text-anchor="middle">hcount/vcount select screen pixel</text>
  <text class="body" x="865" y="528" text-anchor="middle">display_scaler maps screen to BRAM</text>
  <text class="body" x="865" y="556" text-anchor="middle">sync is delayed to match pixel data</text>

  <rect class="display" x="1165" y="430" width="300" height="150" rx="16"/>
  <text class="step-title" x="1315" y="465" text-anchor="middle">7. Apply filter</text>
  <text class="body" x="1315" y="500" text-anchor="middle">SW 00 raw</text>
  <text class="body" x="1315" y="525" text-anchor="middle">SW 01 grayscale</text>
  <text class="body" x="1315" y="550" text-anchor="middle">SW 10 red-only, SW 11 invert</text>

  <path class="arrow" d="M1305 340 C1305 390 385 380 385 420"/>
  <path class="arrow" d="M565 505 L675 505"/>
  <path class="arrow" d="M1045 505 L1155 505"/>

  <!-- Bottom row -->
  <rect class="display" x="190" y="675" width="390" height="150" rx="16"/>
  <text class="step-title" x="385" y="710" text-anchor="middle">VGA color output</text>
  <text class="body" x="385" y="745" text-anchor="middle">RGB565 is reduced to 4-bit VGA DACs</text>
  <text class="body" x="385" y="775" text-anchor="middle">red = pixel[15:12]</text>
  <text class="body" x="385" y="800" text-anchor="middle">green = pixel[10:7], blue = pixel[4:1]</text>

  <rect class="display" x="715" y="675" width="360" height="150" rx="16"/>
  <text class="step-title" x="895" y="710" text-anchor="middle">VGA timing</text>
  <text class="body" x="895" y="745" text-anchor="middle">640 active + porches = 800 clocks</text>
  <text class="body" x="895" y="775" text-anchor="middle">480 active + porches = 525 lines</text>
  <text class="body" x="895" y="800" text-anchor="middle">25 MHz gives about 59.5 frames/s</text>

  <rect class="warn" x="1210" y="675" width="290" height="150" rx="16"/>
  <text class="step-title" x="1355" y="710" text-anchor="middle">Startup safety</text>
  <text class="body" x="1355" y="745" text-anchor="middle">frame_valid is 0 at reset</text>
  <text class="body" x="1355" y="775" text-anchor="middle">screen stays black</text>
  <text class="body" x="1355" y="800" text-anchor="middle">until first complete frame</text>

  <path class="arrow" d="M1315 580 C1315 640 385 625 385 665"/>
  <path class="arrow" d="M580 750 L705 750"/>
  <path class="arrow" d="M1075 750 L1200 750"/>

  <text class="small" x="75" y="885">Reading order: camera bytes -> RGB565 pixel -> crop/downsample -> BRAM -> screen address mapping -> filter -> VGA color and sync.</text>
</svg>
