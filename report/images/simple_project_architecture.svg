<svg xmlns="http://www.w3.org/2000/svg" width="1850" height="1050" viewBox="0 0 1850 1050">
  <defs>
    <marker id="arrow-blue" markerWidth="14" markerHeight="10" refX="13" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L14,5 L0,10 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-orange" markerWidth="14" markerHeight="10" refX="13" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L14,5 L0,10 Z" fill="#d97706"/>
    </marker>
    <marker id="arrow-red" markerWidth="14" markerHeight="10" refX="13" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L14,5 L0,10 Z" fill="#dc2626"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; }
      .title { font: 700 34px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 18px Arial, sans-serif; fill: #475569; }
      .lane { font: 700 19px Arial, sans-serif; fill: #334155; letter-spacing: 0.5px; }
      .box-title { font: 700 21px Arial, sans-serif; fill: #111827; }
      .box-body { font: 16px Arial, sans-serif; fill: #334155; }
      .label { font: 15px Arial, sans-serif; fill: #475569; }
      .tiny { font: 14px Arial, sans-serif; fill: #475569; }
      .camera { fill: #dcfce7; stroke: #16a34a; stroke-width: 3; }
      .capture { fill: #dbeafe; stroke: #2563eb; stroke-width: 3; }
      .memory { fill: #ede9fe; stroke: #7c3aed; stroke-width: 3; }
      .display { fill: #ffedd5; stroke: #ea580c; stroke-width: 3; }
      .control { fill: #fef3c7; stroke: #d97706; stroke-width: 3; }
      .note { fill: #f1f5f9; stroke: #94a3b8; stroke-width: 2; }
      .data-line { fill: none; stroke: #2563eb; stroke-width: 4; marker-end: url(#arrow-blue); }
      .ctrl-line { fill: none; stroke: #d97706; stroke-width: 4; marker-end: url(#arrow-orange); }
      .clock-line { fill: none; stroke: #dc2626; stroke-width: 3; stroke-dasharray: 10 8; marker-end: url(#arrow-red); }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1850" height="1050"/>
  <text class="title" x="60" y="62">Real-Time OV7670 Video Capture and VGA Processing System</text>
  <text class="subtitle" x="60" y="96">Clean architecture view: configuration path, live video path, clock domains, and user control.</text>

  <rect class="panel" x="40" y="130" width="1770" height="820" rx="18"/>

  <text class="lane" x="70" y="178">1. Camera configuration path</text>
  <text class="lane" x="70" y="318">2. Live video data path</text>
  <text class="lane" x="70" y="735">3. Clock domains and startup protection</text>

  <!-- Configuration path -->
  <rect class="control" x="360" y="145" width="240" height="90" rx="14"/>
  <text class="box-title" x="480" y="178" text-anchor="middle">ov7670_config</text>
  <text class="box-body" x="480" y="205" text-anchor="middle">69 register writes</text>
  <text class="box-body" x="480" y="226" text-anchor="middle">2 ms wait per write</text>

  <rect class="control" x="690" y="145" width="240" height="90" rx="14"/>
  <text class="box-title" x="810" y="178" text-anchor="middle">sccb_master</text>
  <text class="box-body" x="810" y="205" text-anchor="middle">100 kHz serial bus</text>
  <text class="box-body" x="810" y="226" text-anchor="middle">START, ID, reg, data, STOP</text>

  <!-- Video path -->
  <rect class="camera" x="70" y="360" width="230" height="150" rx="16"/>
  <text class="box-title" x="185" y="398" text-anchor="middle">OV7670 Camera</text>
  <text class="box-body" x="185" y="430" text-anchor="middle">D[7:0], PCLK</text>
  <text class="box-body" x="185" y="454" text-anchor="middle">HREF, VSYNC</text>
  <text class="box-body" x="185" y="478" text-anchor="middle">RGB565 byte stream</text>

  <rect class="capture" x="360" y="360" width="240" height="150" rx="16"/>
  <text class="box-title" x="480" y="393" text-anchor="middle">ov7670_capture</text>
  <text class="box-body" x="480" y="424" text-anchor="middle">2 bytes to 1 pixel</text>
  <text class="box-body" x="480" y="448" text-anchor="middle">crop edge noise</text>
  <text class="box-body" x="480" y="472" text-anchor="middle">downsample 640x480</text>
  <text class="box-body" x="480" y="496" text-anchor="middle">to 320x240</text>

  <rect class="memory" x="670" y="350" width="250" height="170" rx="16"/>
  <text class="box-title" x="795" y="388" text-anchor="middle">frame_buffer</text>
  <text class="box-body" x="795" y="420" text-anchor="middle">True dual-port BRAM</text>
  <text class="box-body" x="795" y="444" text-anchor="middle">76,800 x 16 bits</text>
  <text class="box-body" x="795" y="468" text-anchor="middle">Port A writes camera</text>
  <text class="box-body" x="795" y="492" text-anchor="middle">Port B reads VGA</text>

  <rect class="display" x="990" y="360" width="240" height="150" rx="16"/>
  <text class="box-title" x="1110" y="393" text-anchor="middle">display_scaler</text>
  <text class="box-body" x="1110" y="424" text-anchor="middle">screen to BRAM addr</text>
  <text class="box-body" x="1110" y="448" text-anchor="middle">rotate and mirror</text>
  <text class="box-body" x="1110" y="472" text-anchor="middle">center 360x480 image</text>

  <rect class="display" x="1290" y="360" width="210" height="150" rx="16"/>
  <text class="box-title" x="1395" y="393" text-anchor="middle">filter_engine</text>
  <text class="box-body" x="1395" y="424" text-anchor="middle">raw</text>
  <text class="box-body" x="1395" y="448" text-anchor="middle">grayscale</text>
  <text class="box-body" x="1395" y="472" text-anchor="middle">red-only / invert</text>

  <rect class="display" x="1580" y="360" width="180" height="150" rx="16"/>
  <text class="box-title" x="1670" y="398" text-anchor="middle">VGA Monitor</text>
  <text class="box-body" x="1670" y="430" text-anchor="middle">RGB[3:0]</text>
  <text class="box-body" x="1670" y="454" text-anchor="middle">HSYNC</text>
  <text class="box-body" x="1670" y="478" text-anchor="middle">VSYNC</text>

  <rect class="display" x="990" y="575" width="240" height="105" rx="14"/>
  <text class="box-title" x="1110" y="610" text-anchor="middle">vga_controller</text>
  <text class="box-body" x="1110" y="638" text-anchor="middle">hcount 0..799</text>
  <text class="box-body" x="1110" y="662" text-anchor="middle">vcount 0..524</text>

  <rect class="control" x="1290" y="575" width="210" height="105" rx="14"/>
  <text class="box-title" x="1395" y="610" text-anchor="middle">Switch Control</text>
  <text class="box-body" x="1395" y="638" text-anchor="middle">SW[1:0]</text>
  <text class="box-body" x="1395" y="662" text-anchor="middle">selects filter</text>

  <!-- Data arrows -->
  <path class="data-line" d="M300 435 L350 435"/>
  <text class="label" x="325" y="417" text-anchor="middle">bytes</text>
  <path class="data-line" d="M600 435 L660 435"/>
  <text class="label" x="630" y="417" text-anchor="middle">RGB565 writes</text>
  <path class="data-line" d="M920 435 L980 435"/>
  <text class="label" x="950" y="417" text-anchor="middle">read pixel</text>
  <path class="data-line" d="M1230 435 L1280 435"/>
  <path class="data-line" d="M1500 435 L1570 435"/>

  <!-- Control arrows -->
  <path class="ctrl-line" d="M600 190 L680 190"/>
  <text class="label" x="640" y="172" text-anchor="middle">addr/data</text>
  <path class="ctrl-line" d="M690 235 C590 300 340 260 220 350"/>
  <text class="label" x="475" y="285" text-anchor="middle">SCCB writes configure camera</text>
  <path class="ctrl-line" d="M1110 575 L1110 520"/>
  <text class="label" x="1190" y="555">hcount/vcount</text>
  <path class="ctrl-line" d="M1230 628 C1370 690 1595 660 1650 520"/>
  <text class="label" x="1538" y="650">sync timing</text>
  <path class="ctrl-line" d="M1395 575 L1395 520"/>

  <!-- Clock domain row -->
  <rect class="note" x="90" y="770" width="420" height="120" rx="12"/>
  <text class="box-title" x="300" y="805" text-anchor="middle">Camera clock domain</text>
  <text class="box-body" x="300" y="835" text-anchor="middle">cam_pclk from OV7670</text>
  <text class="box-body" x="300" y="860" text-anchor="middle">ov7670_capture and BRAM write port</text>

  <rect class="note" x="555" y="770" width="420" height="120" rx="12"/>
  <text class="box-title" x="765" y="805" text-anchor="middle">System clock domain</text>
  <text class="box-body" x="765" y="835" text-anchor="middle">100 MHz Basys 3 clock</text>
  <text class="box-body" x="765" y="860" text-anchor="middle">SCCB config and startup reset</text>

  <rect class="note" x="1020" y="770" width="420" height="120" rx="12"/>
  <text class="box-title" x="1230" y="805" text-anchor="middle">Pixel clock domain</text>
  <text class="box-body" x="1230" y="835" text-anchor="middle">25 MHz VGA pixel clock</text>
  <text class="box-body" x="1230" y="860" text-anchor="middle">VGA timing and BRAM read port</text>

  <rect class="note" x="1485" y="770" width="270" height="120" rx="12"/>
  <text class="box-title" x="1620" y="805" text-anchor="middle">Startup guard</text>
  <text class="box-body" x="1620" y="835" text-anchor="middle">frame_valid keeps</text>
  <text class="box-body" x="1620" y="860" text-anchor="middle">screen black until</text>
  <text class="box-body" x="1620" y="884" text-anchor="middle">first full frame</text>

  <path class="clock-line" d="M205 770 C190 650 190 575 185 520"/>
  <path class="clock-line" d="M765 770 C770 650 790 590 795 520"/>
  <path class="clock-line" d="M1230 770 C1210 710 1160 690 1110 680"/>
  <path class="clock-line" d="M1230 770 C1200 670 1130 600 1125 520"/>

  <text class="tiny" x="70" y="982">Key idea: camera capture and VGA display run on different clocks, so the frame buffer is the safe handoff point.</text>
</svg>
